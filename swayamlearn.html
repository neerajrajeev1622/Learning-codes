<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title> Operative calc </title>
    </head>
    <body>
        <h1> Operative Calculator </h1>
        <div> This is an operative calculator and just give numbers in num1 and num2 and operation in 
            oper and you get the output in output box
        </div>
        <hr>
        <form onsubmit="calculate(); return false;">
            <input type="number" id="num1" placeholder="Enter Number 1" required>
            <select id="operation">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>
            <input type="number" id="num2" placeholder="Enter Number 2" required>
            <br><br>
            <button type="submit">Calculate</button>
        </form>
        <h3>Result: <span id="result">0</span></h3>
        <script>
            function calculate(){
                let num1 = parseFloat(document.getElementById("num1").value);
                let num2 = parseFloat(document.getElementById("num2").value);

                let op = document.getElementById("operation").value;
                let result;
                if(op === '+'){
                    result = num1 + num2;}
                else if(op === '-'){
                    result = num1 - num2;
                }
                else if(op === '*'){
                    result = num1 * num2;
                }
                else if(op === '/'){
                    result = num2 !== 0 ? num1/num2 : "cannot divide by zero";
                }
                document.getElementById("result").innerText = result;
            }
        </script>
    </body>
</html>
